name: lighthouse

# §11.3.10 — real-device Lighthouse runs against the built site, with
# thresholds enforced via `.github/lighthouse/lighthouserc.json`. Catches
# the Core Web Vitals regressions the static check-seo workflow can't see.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@niclaslindstedt"
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build
      - run: npm install --global @lhci/cli@0.14.x
      - run: lhci autorun --config=./.github/lighthouse/lighthouserc.json
