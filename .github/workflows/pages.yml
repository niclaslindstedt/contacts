name: pages

# Every commit merged to `main` publishes the rolling "preview" channel at
# `/preview/` on the custom domain — the bleeding-edge build ahead of the
# released app. The released app at the root is published separately by
# `release.yml`; per-branch builds by `branch-preview.yml`. All three commit
# sibling subtrees of the shared `gh-pages` branch via scripts/deploy-pages.sh,
# so Pages must be configured to deploy from the `gh-pages` branch (root).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

# All three channels push to the same `gh-pages` branch; serialise them under
# one group so their commits never race. Never cancel an in-flight deploy.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@niclaslindstedt"
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Build the preview channel at its own base path under the custom domain
      # (contacts.niclaslindstedt.se/preview/). The OAuth identities are public
      # identifiers, supplied as repository variables.
      - run: npm run build
        env:
          VITE_BASE: /preview/
          VITE_DROPBOX_APP_KEY: ${{ vars.DROPBOX_APP_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      # Only the root release owns the domain's CNAME; drop the copy that
      # public/ carries into this channel's subdirectory, and keep the preview
      # channel out of search indexes.
      - name: Prepare channel output
        run: |
          rm -f dist/CNAME
          printf 'User-agent: *\nDisallow: /\n' > dist/robots.txt
      - name: Deploy to preview channel
        run: ./scripts/deploy-pages.sh preview dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
