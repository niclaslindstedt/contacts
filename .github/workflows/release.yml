name: release

# Triggered by the `v*` tag push that version-bump performs. That
# upstream tag push must be authenticated with RELEASE_TOKEN (a PAT
# or GitHub App token) — the default GITHUB_TOKEN deliberately
# suppresses downstream workflow triggers, so a tag pushed with it
# would not fire this workflow.
#
# This workflow itself uses the default GITHUB_TOKEN for its
# commit-to-main and retag steps. That same trigger suppression is
# what prevents the force-pushed tag from re-firing this workflow on
# itself and starting a duplicate release run. See OSS_SPEC §10.3.
on:
  push:
    tags:
      - "v*"

# Default to no permissions; every job declares its own
# least-privilege `permissions:` block (see OSS_SPEC §10.3).
permissions: {}

# The release publishes the root channel of the shared `gh-pages` branch, which
# the `pages` (preview) and `branch-preview` workflows also push to. Serialise
# all three under one group so their commits never race.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # contents: write — this job pushes the release commit and
    #                   force-pushes the rewritten tag to `main`.
    # packages: read  — npm ci resolves the framework from GitHub Packages.
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Generate changelog
        run: ./scripts/generate-changelog.sh "${{ steps.tag.outputs.tag }}"
      - name: Update versions
        run: ./scripts/update-versions.sh "${{ steps.tag.outputs.tag }}"
      - name: Commit + retag
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): update changelog and versions for ${{ steps.tag.outputs.tag }}"
          git tag -f "${{ steps.tag.outputs.tag }}" HEAD
          git push origin HEAD:main
          git push origin "${{ steps.tag.outputs.tag }}" --force
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@niclaslindstedt"
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Build the released app at the domain root (base `/`). VITE_PWA_IGNORE_PATHS
      # lists the sibling channels nested under it so the root service worker
      # disowns their pages (its scope `/` is a prefix of every path) — otherwise
      # the root worker would serve the released shell in place of preview/branch.
      - run: npm run build
        env:
          VITE_BASE: /
          VITE_PWA_IGNORE_PATHS: /preview/,/branch/
          VITE_DROPBOX_APP_KEY: ${{ vars.DROPBOX_APP_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      # This is an app, not a package — the deliverable is the Pages deploy;
      # no registry publish happens here. Publish the release to the root
      # channel, preserving the sibling preview/ and branch/ channels.
      - name: Deploy release to root
        run: ./scripts/deploy-pages.sh . dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
