<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- The app mark: a person outline drawn as a top-to-bottom gradient stroke
       on the app's dark surface — the line-art style shared with the sibling
       notes and checklist apps, in a distinct blue (they wear green). The PNG
       install icons are generated from the same geometry by
       scripts/generate-icons.mjs (`npm run icons`). -->
  <defs>
    <linearGradient id="mark" x1="0" y1="25" x2="0" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0b0d10"/>
  <circle cx="50" cy="38" r="13" fill="none" stroke="url(#mark)" stroke-width="8"/>
  <path d="M27 76 A23.1 23.1 0 0 1 73 76" fill="none" stroke="url(#mark)" stroke-width="8" stroke-linecap="round"/>
</svg>
