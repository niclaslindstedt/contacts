<!doctype html>
<!-- `data-theme` seeds the default preset before the app mounts (the engine
     then keeps it in sync); the framework's token blocks key off it. -->
<html lang="en" data-theme="githubDark">
  <head>
    <meta charset="UTF-8" />
    <!-- Lock the viewport scale: an installed PWA is an app, not a document.
         `maximum-scale=1, user-scalable=no` disables pinch-zoom and iOS's
         focus auto-zoom; `viewport-fit=cover` lets the app paint under the
         notch / home indicator (it pads with `env(safe-area-inset-*)`). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Contacts — a local-first address book</title>
    <meta
      name="description"
      content="Contacts is a local-first address book PWA. Your contacts live on your device, sync to Dropbox or Google Drive if you want, can be encrypted at rest, and export as vCard or CSV for Outlook, iOS, and Android."
    />
    <link rel="canonical" href="https://niclaslindstedt.github.io/contacts/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Contacts — a local-first address book" />

      property="og:description"

      property="og:url"
      content="https://niclaslindstedt.github.io/contacts/"
    />
    <meta
